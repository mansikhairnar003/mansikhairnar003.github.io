<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Mansi Khairnar</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>

    .thanks-container {
      height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
    .check-icon {
      font-size: 80px;
      color: #2ecc71; 
      margin-bottom: 20px;
    }
    .thanks-title {
      font-size: 3rem;
      color: #7c3aed; 
      font-weight: 700;
      margin-bottom: 10px;
    }
    .thanks-text {
      color: #64748b;
      max-width: 500px;
      font-size: 1.1rem;
      margin-bottom: 30px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <div class="logo">Mansi<span>.</span></div>
    </nav>
  </header>

  <main class="thanks-container">
    <div class="check-icon">
      <i class="fas fa-check-circle"></i>
    </div>
    <h1 class="thanks-title">Message Sent!</h1>
    <p class="thanks-text">
      Thank you for reaching out, Mansi has received your message and will get back to you shortly.
    </p>
    <a href="index.html" class="btn">Back to Portfolio</a>
  </main>
</body>
</html>
