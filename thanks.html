<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Mansi Khairnar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .thanks-container {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .thanks-container i {
            font-size: 80px;
            color: #22c55e; /* Success Green */
            margin-bottom: 20px;
        }
        .thanks-container h1 {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        .thanks-container p {
            color: var(--text-color-light);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">Mansi<span>.</span></div>
        </nav>
    </header>

    <main class="thanks-container">
        <i class="fas fa-check-circle"></i>
        <h1>Message Sent!</h1>
        <p>Thank you for reaching out, Mansi has received your message <br> and will get back to you shortly.</p>
        
        <a href="index.html" class="btn">Back to Portfolio</a>
    </main>
</body>
</html>
